<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Portal{% endblock %}</title>
    <style>
        :root {
            --bg: #f4fbf8;
            --surface: #ffffff;
            --surface-soft: #eafaf2;
            --text: #12322a;
            --muted: #4d6f64;
            --primary: #0f9f73;
            --primary-dark: #0b7656;
            --danger: #d64f5f;
            --border: #cce9dc;
            --success-bg: #eafaf2;
            --success-text: #0f7658;
            --error-bg: #ffedf0;
            --error-text: #a51d3d;
            --radius: 14px;
            --shadow: 0 16px 32px rgba(12, 75, 57, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "Gill Sans MT", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% -5%, #d2ffea 0, transparent 34%),
                radial-gradient(circle at 110% 110%, #dff8ff 0, transparent 40%),
                var(--bg);
        }

        .shell {
            min-height: 100vh;
            max-width: 1050px;
            margin: 0 auto;
            padding: 28px 18px 34px;
        }

        .topbar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 14px;
        }

        .brand {
            text-decoration: none;
            color: var(--primary-dark);
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .nav a {
            text-decoration: none;
            color: var(--muted);
            border-radius: 10px;
            border: 1px solid transparent;
            padding: 8px 12px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .nav a:hover {
            background: var(--surface-soft);
            border-color: var(--border);
            color: var(--primary-dark);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px;
        }

        .section-title {
            margin: 0 0 15px;
            font-size: 1.4rem;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
            padding: 9px 14px;
            transition: 0.2s ease;
            font-size: 0.93rem;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: #fff; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }

        th, td {
            text-align: left;
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--surface-soft);
            color: var(--primary-dark);
            font-size: 0.9rem;
        }

        .msg {
            padding: 11px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .msg.success { background: var(--success-bg); color: var(--success-text); }
        .msg.error { background: var(--error-bg); color: var(--error-text); }

        .form-shell p { margin: 0 0 13px; }
        .form-shell label {
            display: block;
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .form-shell input, .form-shell select, .form-shell textarea {
            width: 100%;
            border: 1px solid #bde3d2;
            border-radius: 10px;
            padding: 10px;
            font: inherit;
            background: #fff;
        }

        .helper-link { margin-top: 12px; }

        @media (max-width: 720px) {
            .topbar { flex-direction: column; align-items: flex-start; }
            .card { padding: 18px; }
            .shell { padding: 16px 10px 22px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="{% url 'student_portal:dashboard' %}">Student Portal</a>
            {% if request.user.is_authenticated and not request.user.is_staff %}
                <nav class="nav">
                    <a href="{% url 'student_portal:dashboard' %}">Dashboard</a>
                    <a href="{% url 'student_portal:results' %}">Results</a>
                    <a href="{% url 'student_portal:logout' %}">Logout</a>
                </nav>
            {% endif %}
        </header>

        {% if messages %}
            {% for message in messages %}
                <div class="msg {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <main class="card">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
