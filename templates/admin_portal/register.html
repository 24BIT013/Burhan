{% extends "admin_portal/base.html" %}
{% block title %}Admin Register{% endblock %}
{% block content %}
<h2 class="section-title">Admin Registration</h2>
<form method="post" class="form-shell">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Create Admin Account</button>
</form>
<p class="helper-link"><a href="{% url 'admin_portal:login' %}">Back to admin login</a></p>
{% endblock %}
