<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Portal{% endblock %}</title>
    <style>
        :root {
            --bg: #f3f6ff;
            --surface: #ffffff;
            --surface-soft: #eef3ff;
            --text: #13213f;
            --muted: #5b6785;
            --primary: #2455ff;
            --primary-dark: #193ec0;
            --danger: #c4375a;
            --border: #dce4ff;
            --success-bg: #e9faef;
            --success-text: #1f7a44;
            --error-bg: #ffecef;
            --error-text: #a21e39;
            --radius: 14px;
            --shadow: 0 16px 32px rgba(26, 46, 95, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", "Trebuchet MS", Tahoma, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 0% 0%, #dce6ff 0, transparent 42%),
                radial-gradient(circle at 100% 100%, #d6f4ff 0, transparent 46%),
                var(--bg);
        }

        .shell {
            min-height: 100vh;
            max-width: 1150px;
            margin: 0 auto;
            padding: 28px 20px 36px;
        }

        .topbar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px 18px;
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .brand {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            color: var(--primary-dark);
            text-decoration: none;
        }

        .nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            color: var(--muted);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .nav a:hover {
            color: var(--primary-dark);
            border-color: var(--border);
            background: var(--surface-soft);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }

        h1, h2, h3 { margin-top: 0; }

        .section-title {
            margin: 0 0 16px;
            font-size: 1.45rem;
            line-height: 1.2;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 16px 0 20px;
        }

        .metric {
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .metric b {
            display: block;
            font-size: 1.3rem;
            margin-top: 5px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-block;
            border: 0;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
            padding: 9px 14px;
            transition: 0.2s ease;
            font-size: 0.93rem;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: #fff; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }

        th, td {
            text-align: left;
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--surface-soft);
            color: var(--primary-dark);
            font-size: 0.9rem;
        }

        .msg {
            padding: 11px 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .msg.success { background: var(--success-bg); color: var(--success-text); }
        .msg.error { background: var(--error-bg); color: var(--error-text); }

        .form-shell p { margin: 0 0 13px; }
        .form-shell label {
            display: block;
            font-size: 0.88rem;
            color: var(--muted);
            margin-bottom: 4px;
            font-weight: 700;
        }

        .form-shell input, .form-shell select, .form-shell textarea {
            width: 100%;
            border: 1px solid #c9d6ff;
            border-radius: 10px;
            padding: 10px;
            font: inherit;
            background: #fff;
        }

        .helper-link { margin-top: 12px; }
        .field-error {
            display: block;
            margin-top: 4px;
            color: var(--error-text);
            font-weight: 600;
        }

        @media (max-width: 720px) {
            .topbar { flex-direction: column; align-items: flex-start; }
            .card { padding: 18px; }
            .shell { padding: 16px 12px 22px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="{% url 'admin_portal:dashboard' %}">Admin Portal</a>
            {% if request.user.is_authenticated and request.user.is_staff %}
                <nav class="nav">
                    <a href="{% url 'admin_portal:dashboard' %}">Dashboard</a>
                    <a href="{% url 'admin_portal:student_list' %}">Students</a>
                    <a href="{% url 'admin_portal:course_list' %}">Courses</a>
                    <a href="{% url 'admin_portal:enrollment_list' %}">Enrollments</a>
                    <a href="{% url 'admin_portal:result_list' %}">Results</a>
                    <a href="{% url 'admin_portal:logout' %}">Logout</a>
                </nav>
            {% endif %}
        </header>

        {% if messages %}
            {% for message in messages %}
                <div class="msg {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <main class="card">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
